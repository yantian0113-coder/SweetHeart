**Project Overview（按要求保留原文）**  
We are developing "Cyan-Archive" (藍藻記憶檔案館) — a speculative biodesign installation that turns the planet’s oldest oxygen-producing life form, cyanobacteria (藍藻), into a living atmospheric memory archive. 

Cyanobacteria performed oxygenic photosynthesis during the Great Oxidation Event (~2.4–2.1 billion years ago), fundamentally transforming Earth’s atmosphere. In this project, they become “living photographic plates” that record contemporary atmospheric changes through oxygen bubble production and subtle color shifts.

---

## 1. Personal Interest Maps & Intersection Statements

### 个人兴趣图谱（技能 → 媒介 →目标）

- **組員A（视觉传达 / 空间与材料）**
  - **优势技能**：品牌VI与信息设计、展陈叙事与空间美学、透明材料与结构语言（亚克力/PC）、可视化“数据标签化”系统、可控的制作工艺（激光切割/折弯/卡扣结构）。
  - **生物兴趣**：可被“看见”的生命过程（光合作用、气泡、色素变化）、低门槛培养体系（BG-11）、可被观众即时影响的微生物响应。
  - **表达目标**：把“抽象的大气变化”变成“当下可感的经验”，让观者在展场中立刻理解其发生与被改写。

- **組員B（多媒体 / 交互与实时生成）**
  - **优势技能**：可编程灯光矩阵、实时图像采集与参数提取（webcam / CV）、TouchDesigner节点式实时生成、投影与交互装置搭建。
  - **数字目标**：用光谱/强度/节律作为输入，把生物反应转译为可读的时间轴与未来情景生成。

### 交集陈述（按Ideation Guide格式）

> **What if we used** *programmable light + computer vision + generative projection*  
> **to** *modulate and read* *cyanobacteria photosynthetic activity*  
> **in order to** *turn contemporary atmospheric change into a living, interpretable memory archive*?

一句话电梯陈述（评委/观众版）：

> **“Cyan-Archive 把蓝藻变成‘活的底片’：我们用光与CO₂触发它们的光合作用，并用摄像头把气泡与色彩变化实时翻译成一条正在生成的‘大气记忆时间线’。”**

## 2. Bio + Digital Split

> 红旗测试：**去掉生物就不成立**；**去掉数字也不成立**。两层必须承重。

| 模块 | 生物层（Bio）做什么 | 数字层（Digital）做什么 | 为什么两者都不可替代 |
|---|---|---|---|
| **输入** | 光谱与强度改变蓝藻光合速率 | 可编程红/蓝光序列作为“写入” | 光是“编码器”，让叙事变成可重复的实验条件 |
| **核心反应** | 产氧（气泡/溶氧）与细微色偏 | 摄像头读出气泡密度与颜色参数 | 生命反应提供真实性与可被记录的证据链 |
| **输出/叙事** | 作为“活底片”记录当下痕迹 | TouchDesigner生成时间线投影 | 数字把不可见变可读，把微观转成宏观叙事 |
| **交互** | 遮光/呼气CO₂改变反应 | 参数映射到视觉（/声音可选） | 观众成为变量，立刻看到“改写”发生 |

## 3. 200-word Concept Narrative（Problem → Insight → Solution → Impact）

当我们谈论空气与气候，我们往往只能看到滞后的图表：浓度、曲线、预测区间。真正改变世界的，不是数据本身，而是人们能否在此刻感到——我们正在呼吸的东西正在发生变化。  

地球曾经历一次由微生物改写的大气史：在大氧化事件中，蓝藻通过产氧光合作用，让氧气从几乎不存在变成塑造生命的基础。我们将这种古老的“造氧者”带回当代，让它们成为一种活的记忆介质，像摄影底片一样记录大气的状态。  

**Cyan-Archive** 是一座透明的光合记忆矩阵。模块化的亚克力/PC结构像夜间城市的骨架，承载装有蓝藻培养液的透明管瓶。可编程红/蓝光序列作为“写入”；摄像头实时读取气泡密度与色调微变化，将其转译为动态生成的 **Atmospheric Memory Timeline** 投影：从清澈天空到雾霾光晕、从稳定到剧烈波动的未来图景。观众遮光或向联动舱呼气 CO₂，会即时改写蓝藻的响应，也同步改写时间线。  

作品提出问题：**如果微生物一直在为地球“记忆并塑形”空气，我们该如何与它们共处？**在“Convergent Life”语境下，它把人类、AI与最古老生命放进同一条可见的呼吸回路。

## 4. Research Brief

### 4.1 生物可行性（学生友好、可展示）

- **培养基**：BG-11 为淡水蓝藻的经典培养基之一，公开配方可直接引用（Rippka et al., 1979）。例如 CPCC 给出配方、用途与 pH 建议：\`https://uwaterloo.ca/canadian-phycological-culture-centre/cultures/culture-media/bg-11\`
- **可视化信号**：光合会产生氧气并可能在容器中形成可观察气泡/溶氧变化；色素与色调会随光谱、光强与营养条件出现可测变化（需以你们容器尺度做对照实验验证并建立参数化方法）。
- **安全**：优先选择可追溯来源、教学/研究常用、低风险菌株；封闭容器展示；遵循学校生物安全规范。

### 4.2 GOE（大氧化事件）关键背书文献

- Lyons, Reinhard, Planavsky. *Nature* (2014). “The rise of oxygen in Earth’s early ocean and atmosphere.” \`https://www.nature.com/articles/nature13068\`
- Planavsky et al. *Nature Geoscience* (2014). “Evidence for oxygenic photosynthesis half a billion years before the Great Oxidation Event.” \`https://www.nature.com/articles/ngeo2122\`

### 4.3 2025 先例（living cyanobacteria / living materials）

- ETH Zurich（2025）光合活材料与展览语境：\`https://ethz.ch/en/news-and-events/eth-news/news/2025/06/a-building-material-that-lives-and-stores-carbon.html\`

## 1. Personal Interest Maps & Intersection Statements

### How the concept emerged from our skills

  - **Strengths**: programmable light matrices, real-time image acquisition and feature extraction (webcam + light-weight computer vision), node-based generative systems (TouchDesigner), projection and interactive installation buildout.

> **What if we used** *programmable light + computer vision + generative projection*

> **Cyan-Archive turns cyanobacteria into “living photographic plates”: light and CO₂ act as inputs, and a camera translates oxygen bubbles and subtle color drift into a real-time Atmospheric Memory Timeline.**

## 2. Bio + Digital Split

**Red-flag test**: if biology is removed, the work collapses into mere visual effects; if computation is removed, it collapses into a static culture display. Both layers must remain load-bearing.

| Component | Biological layer (Bio) | Digital layer (Digital) | Why both layers are essential |
|---|---|---|---|
| Input | cyanobacteria respond to spectrum/intensity via photosynthesis rate | programmable red/blue light sequences as “writing” | light becomes a repeatable, exhibit-ready encoding mechanism |
| Core signal | oxygen evolution (bubbles/DO proxy) + micro pigment/tonal drift | webcam extracts bubble density proxies + color metrics | living response provides the evidentiary substrate (not simulated data) |
| Output | “living plate” retains traces of current conditions | TouchDesigner generates the Atmospheric Memory Timeline | computation makes the invisible legible and narratable |
| Interaction | blocking light / exhaled CO₂ changes response | mapping to visual (and optional sound) parameters | the audience becomes a variable—cause/effect is immediate |

## 3. 200-word Concept Narrative (Problem → Insight → Solution → Impact)

When we speak about air and climate, we are usually handed delayed charts—concentrations, curves, confidence intervals. Yet what changes behavior is rarely the data alone; it is the ability to feel that the atmosphere is changing **now**, through our own bodies and breath.  

Earth’s atmosphere has been rewritten by microorganisms before. During the Great Oxidation Event, cyanobacteria—through oxygenic photosynthesis—helped shift oxygen from near absence into a planetary condition for complex life. We bring these ancient “oxygen makers” into the present as a living recording medium: a speculative archive that treats cyanobacteria as photographic plates, registering atmospheric conditions through oxygen bubble production and subtle pigment drift.  

**Cyan-Archive** is a transparent photosynthetic memory matrix: a modular acrylic/polycarbonate structure, like a cyber-biological “night city,” holding culture vessels within a clear, interlocking grid. Programmable red/blue light sequences act as a controllable “write” signal. A simple webcam reads bubble-density proxies and micro color changes in real time, feeding parameters into TouchDesigner to generate an AI-assisted **Atmospheric Memory Timeline**—a projection that visualizes possible future skies (clarity, haze, halos, volatility). Audience actions—blocking light or exhaling CO₂ into a linked chamber—immediately perturb the culture and the timeline.  

If microorganisms are Earth’s memory, how should we coexist with them? Under the 2026 “Convergent Life” theme, Cyan-Archive links humans, AI, and the planet’s oldest life into a single visible breathing loop.

## 4. Research Brief

### 4.1 Biological feasibility (student-friendly, exhibit-ready)

- **Medium**: BG-11 is a widely used freshwater cyanobacteria medium with publicly documented formulations referencing Rippka et al. (1979). A culture-center reference is available here: \`https://uwaterloo.ca/canadian-phycological-culture-centre/cultures/culture-media/bg-11\`
- **Legible signals**: oxygen evolution can manifest as measurable gas/DO dynamics; pigmentation/tonal drift can be induced by spectral and growth-condition changes (to be validated via your container scale and controlled imaging setup).
- **Safety**: use traceable, education/research-standard strains and closed vessels; comply with institutional biosafety protocols.

### 4.2 Great Oxidation Event references

- Lyons, Reinhard, Planavsky. *Nature* (2014). “The rise of oxygen in Earth’s early ocean and atmosphere.” \`https://www.nature.com/articles/nature13068\`
- Planavsky et al. *Nature Geoscience* (2014). “Evidence for oxygenic photosynthesis half a billion years before the Great Oxidation Event.” \`https://www.nature.com/articles/ngeo2122\`

## 6. Prototype & Technical Stack (low-code, demo-first)

- **Fabrication**: laser-cut acrylic/PC + folding/interlocking joints → modular matrix  
- **Write signal**: programmable red/blue LEDs (intensity / rhythm / presets)  
- **Read signal**: fixed white balance/exposure webcam; ROI statistics (bubble proxy + color metrics)  
- **Real-time**: TouchDesigner TOP/CHOP pipeline → projection output  
- **AI policy**: constrained generation (scenario library & interpolation), explicitly **not** a scientific predictor; maintain explainable mappings

- **Failure-proofing**: weak bubbles/colors → macro + controls + time-lapse; unstable real-time → offline playback fallback; culture failure → parallel backups and closed-system display

                <li>${isZh ? "<strong>气泡/色偏弱</strong>：用微距+侧光+对照+长时记录增强证据。" : "<strong>Weak bubbles/colors</strong>: macro optics + side-light + controls + time-lapse."}</li>
                <li>${isZh ? "<strong>实时不稳</strong>：离线数据回放兜底（展览不掉线）。" : "<strong>Real-time instability</strong>: offline playback fallback (exhibition-proof)."}</li>
                <li>${isZh ? "<strong>培养失败</strong>：多瓶备份 + 封闭容器 + 合规处理流程。" : "<strong>Culture failure</strong>: parallel backups + closed vessels + compliance protocols."}</li>
              </ul>
            </div>
            <div class="card">
              <div class="text-sm font-semibold">${isZh ? "伦理与AI透明" : "Ethics & AI transparency"}</div>
              <ul class="mt-2">
                <li>${isZh ? "<strong>不做科学预测</strong>：时间线为受约束的叙事推演，清楚标注边界。" : "<strong>No prediction claims</strong>: timeline is constrained narrative extrapolation with explicit limits."}</li>
                <li>${isZh ? "<strong>照护即设计</strong>：将维护与照护写入展陈语言（stewardship）。" : "<strong>Stewardship</strong>: care/maintenance becomes part of the exhibit language."}</li>
                <li>${isZh ? "<strong>可解释映射</strong>：公开参数来源、映射方式与失败记录。" : "<strong>Explainable mapping</strong>: publish parameter sources, mappings, and failures."}</li>
              </ul>
            </div>
          </div>
        </section>

        <section data-background-gradient="radial-gradient(circle at 80% 20%, rgba(34,211,238,0.16) 0%, rgba(7,16,28,1) 56%, rgba(0,0,0,1) 100%)">
          <h2>${isZh ? "Closing" : "Closing"}</h2>
          <p><strong>${isZh ? "我们把蓝藻从“背景生命”变成“共同作者”。" : "We reposition cyanobacteria from background life to co-author."}</strong></p>
          <p class="muted">${isZh ? "在 Convergent Life 语境中，Cyan-Archive 让人类、AI 与最古老的造氧者在同一条可见呼吸回路里协作与共存。" : "Under “Convergent Life,” Cyan-Archive binds humans, AI, and ancient oxygen-makers into a single visible breathing loop."}</p>
          <div class="card mt-4">
            <div class="text-sm font-semibold">${isZh ? "Q&A 关键词" : "Q&A keywords"}</div>
            <p class="mt-2">${isZh ? "Bio/Digital 承重 · 证据链 · 安全与合规 · AI边界与透明 · 照护伦理 · 可扩展展陈" : "Load-bearing split · evidence chain · biosafety/compliance · AI boundaries · stewardship · scalable exhibition display"}</p>
          </div>
        </section>
      `;
    }

    function mountReveal(lang) {
      // Replace slides HTML
      slidesRoot.innerHTML = slidesHtml(lang);

      // (Re)initialize reveal
      try {
        if (window._reveal && window._reveal.isReady && window._reveal.destroy) {
          window._reveal.destroy();
        }
      } catch (_) {}

      window._reveal = new Reveal(document.querySelector('.reveal'), {
        hash: true,
        controls: true,
        progress: true,
        slideNumber: true,
        center: false,
        transition: 'fade',
        backgroundTransition: 'fade'
      });
      window._reveal.initialize();
    }

    // ----------------------------
    // Events
    // ----------------------------
    tabDoc.addEventListener('click', () => setActive('doc'));
    tabPpt.addEventListener('click', () => setActive('ppt'));

    btnLang.addEventListener('click', () => {
      const next = (state.lang === "zh") ? "en" : "zh";
      setLang(next);
      toast(state.lang === "zh" ? "已切换为中文" : "Switched to English");
    });

    document.getElementById('btnFullscreen').addEventListener('click', async () => {
      const el = document.documentElement;
      if (!document.fullscreenElement) await el.requestFullscreen();
      else await document.exitFullscreen();
    });

    document.getElementById('btnPrintPpt').addEventListener('click', () => {
      setActive('ppt');
      const url = new URL(window.location.href);
      url.searchParams.set('print-pdf', '1');
      url.searchParams.set('lang', state.lang);
      window.open(url.toString(), '_blank', 'noopener,noreferrer');
    });

    document.getElementById('btnCopyMd').addEventListener('click', async () => {
      const md = (state.lang === "zh") ? MD_ZH : MD_EN;
      await navigator.clipboard.writeText(md);
      toast(i18n[state.lang].toastCopy);
    });

    document.getElementById('btnDownloadMd').addEventListener('click', () => {
      const md = (state.lang === "zh") ? MD_ZH : MD_EN;
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (state.lang === "zh")
        ? 'Cyan-Archive_Planning_Document_for_BDC2026_ZH.md'
        : 'Cyan-Archive_Planning_Document_for_BDC2026_EN.md';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // Tiny toast
    const toastEl = document.createElement('div');
    toastEl.className = "fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] hidden px-4 py-2 rounded-xl bg-white/15 border border-white/15 backdrop-blur-md text-sm text-white/95 shadow-lg";
    document.body.appendChild(toastEl);
    let toastTimer = null;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.add('hidden'), 1300);
    }

    // ----------------------------
    // Initial boot (supports URL params)
    // ----------------------------
    const urlParams = new URLSearchParams(window.location.search);
    const initialLang = (urlParams.get('lang') === 'en') ? 'en' : 'zh';
    const initialTab = (urlParams.get('ppt') === '1' || window.location.hash.includes('/')) ? 'ppt' : 'doc';

    setLang(initialLang);
    setActive(initialTab);
  </script>
</body>
</html>
