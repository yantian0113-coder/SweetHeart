<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridForge - 智能網格文字排版助手</title>
  <script src="https://cdn.jsdelivr.net/npm/fabric@latest/dist/fabric.min.js"></script>
  <style>
    :root {
      --bg: #0b1114;
      --panel: #121b20;
      --panel-2: #16232a;
      --line: #1f343d;
      --text: #d9f8f1;
      --muted: #8db7ad;
      --accent: #00ffcc;
      --accent-soft: rgba(0, 255, 204, 0.15);
      --danger: #ff5f73;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Noto Sans TC", "PingFang TC", sans-serif;
      background: radial-gradient(circle at top right, #102228 0%, var(--bg) 45%);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 68px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 14, 17, 0.75);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.4px;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(0, 255, 204, 0.25);
    }

    .main {
      display: grid;
      grid-template-columns: 260px 1fr 300px;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      min-height: 0;
    }

    .panel h2 {
      margin: 2px 0 12px;
      font-size: 16px;
      color: var(--accent);
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0d171b;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      transition: 0.2s ease;
    }

    select:focus, button:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.12);
    }

    button {
      cursor: pointer;
      margin-bottom: 8px;
    }

    button:hover {
      border-color: var(--accent);
      background: rgba(0, 255, 204, 0.08);
    }

    .btn-primary {
      border-color: rgba(0, 255, 204, 0.45);
      background: linear-gradient(180deg, rgba(0, 255, 204, 0.16), rgba(0, 255, 204, 0.06));
    }

    .btn-danger {
      border-color: rgba(255, 95, 115, 0.45);
      color: #ffdce1;
    }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .canvas-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    .canvas-stage {
      position: relative;
      width: 900px;
      height: 600px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
      background: #111;
      flex-shrink: 0;
    }

    #fabricCanvas, #gridOverlay {
      position: absolute;
      top: 0;
      left: 0;
    }

    #gridOverlay {
      pointer-events: none;
      z-index: 8;
      opacity: 0.72;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      max-width: 900px;
    }

    .suggestions {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 140px);
      overflow: auto;
      padding-right: 2px;
    }

    .suggestion-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #0f181d;
      cursor: pointer;
      transition: 0.2s;
    }

    .suggestion-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0, 255, 204, 0.12);
      background: var(--accent-soft);
    }

    .suggestion-title {
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--accent);
      font-weight: 700;
    }

    .suggestion-line {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      opacity: 0.92;
    }

    .chip {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 999px;
      background: rgba(0, 255, 204, 0.12);
      color: #9affea;
      border: 1px solid rgba(0, 255, 204, 0.28);
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      text-align: center;
    }

    @media (max-width: 1550px) {
      .main {
        grid-template-columns: 240px 1fr 280px;
      }
    }

    @media (max-width: 1280px) {
      .main {
        grid-template-columns: 1fr;
      }
      .canvas-panel {
        order: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>GridForge - 智能網格文字排版助手</h1>
    </header>

    <section class="main">
      <!-- 左側工具欄 -->
      <aside class="panel">
        <h2>工具欄</h2>

        <div class="control-group">
          <label class="control-label" for="gridType">網格類型</label>
          <select id="gridType">
            <option value="thirds">三分法</option>
            <option value="golden">黃金比例</option>
            <option value="columns12">12欄</option>
            <option value="balance">平衡對稱</option>
          </select>
        </div>

        <button id="importBtn" class="btn-primary">匯入圖片</button>
        <button id="analyzeBtn" class="btn-primary">分析並自動建議排版</button>
        <button id="clearBtn" class="btn-danger">清空畫布</button>
        <input id="imageInput" type="file" accept="image/*" hidden />

        <div class="control-group" style="margin-top: 14px;">
          <span class="control-label">快速套用文字風格</span>
          <div class="quick-row">
            <button id="applyTitleStyle">標題風格</button>
            <button id="applyBodyStyle">說明文字風格</button>
          </div>
        </div>
      </aside>

      <!-- 中央畫布 -->
      <main class="panel canvas-panel">
        <div class="canvas-stage">
          <canvas id="fabricCanvas" width="900" height="600"></canvas>
          <canvas id="gridOverlay" width="900" height="600"></canvas>
        </div>
        <div class="hint">
          畫布固定為 900×600。可拖拉縮放圖片與文字，系統會即時重新分析留白與構圖位置。
        </div>
      </main>

      <!-- 右側建議面板 -->
      <aside class="panel">
        <h2>📍 實時文字排版建議</h2>
        <div id="suggestionList" class="suggestions"></div>
      </aside>
    </section>
  </div>

  <script>
    (() => {
      const CANVAS_W = 900;
      const CANVAS_H = 600;
      const ACCENT = "#00ffcc";
      const suggestionListEl = document.getElementById("suggestionList");
      const gridTypeEl = document.getElementById("gridType");
      const imageInput = document.getElementById("imageInput");

      const canvas = new fabric.Canvas("fabricCanvas", {
        width: CANVAS_W,
        height: CANVAS_H,
        backgroundColor: "#1b2025",
        preserveObjectStacking: true,
        selection: true
      });

      const gridCanvas = document.getElementById("gridOverlay");
      const gctx = gridCanvas.getContext("2d");

      let mainVisualObject = null; // 目前主要圖片（可為示範矩形或匯入圖）
      let latestSuggestions = [];

      function debounce(fn, wait = 280) {
        let timer = null;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), wait);
        };
      }

      // 將物件限制在畫布範圍內，避免完全拖出畫面
      function clampObjectToCanvas(obj) {
        obj.setCoords();
        const rect = obj.getBoundingRect(true, true);

        let dx = 0, dy = 0;
        if (rect.left < 0) dx = -rect.left;
        if (rect.top < 0) dy = -rect.top;
        if (rect.left + rect.width > CANVAS_W) dx = CANVAS_W - (rect.left + rect.width);
        if (rect.top + rect.height > CANVAS_H) dy = CANVAS_H - (rect.top + rect.height);

        obj.left += dx;
        obj.top += dy;
        obj.setCoords();
      }

      function drawGrid(type) {
        gctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        gctx.strokeStyle = "rgba(0, 255, 204, 0.72)";
        gctx.fillStyle = "rgba(0, 255, 204, 0.08)";
        gctx.lineWidth = 1.2;
        gctx.setLineDash([6, 6]);

        const drawV = x => {
          gctx.beginPath();
          gctx.moveTo(x, 0);
          gctx.lineTo(x, CANVAS_H);
          gctx.stroke();
        };
        const drawH = y => {
          gctx.beginPath();
          gctx.moveTo(0, y);
          gctx.lineTo(CANVAS_W, y);
          gctx.stroke();
        };

        if (type === "thirds") {
          drawV(CANVAS_W / 3);
          drawV((CANVAS_W / 3) * 2);
          drawH(CANVAS_H / 3);
          drawH((CANVAS_H / 3) * 2);
        } else if (type === "golden") {
          const phi = 0.618;
          drawV(CANVAS_W * phi);
          drawV(CANVAS_W * (1 - phi));
          drawH(CANVAS_H * phi);
          drawH(CANVAS_H * (1 - phi));
        } else if (type === "columns12") {
          gctx.setLineDash([4, 5]);
          const gap = 14;
          const totalGap = gap * 11;
          const colW = (CANVAS_W - totalGap) / 12;
          let x = 0;
          for (let i = 0; i < 12; i++) {
            gctx.strokeRect(x, 0, colW, CANVAS_H);
            x += colW + gap;
          }
          gctx.setLineDash([6, 6]);
          drawH(CANVAS_H / 2);
        } else if (type === "balance") {
          drawV(CANVAS_W / 2);
          drawH(CANVAS_H / 2);
          drawV(CANVAS_W / 4);
          drawV((CANVAS_W * 3) / 4);
          drawH(CANVAS_H / 4);
          drawH((CANVAS_H * 3) / 4);

          gctx.beginPath();
          gctx.arc(CANVAS_W / 2, CANVAS_H / 2, 120, 0, Math.PI * 2);
          gctx.stroke();
        }

        gctx.setLineDash([]);
      }

      // 根據網格模式提供候選文字位置
      function getGridAnchors(type) {
        const anchors = [];
        const push = (name, x, y, align = "left") => anchors.push({ name, x, y, align });

        if (type === "thirds") {
          push("左上三分交點", CANVAS_W / 3, CANVAS_H / 3, "left");
          push("右上三分交點", (CANVAS_W / 3) * 2, CANVAS_H / 3, "left");
          push("左下三分交點", CANVAS_W / 3, (CANVAS_H / 3) * 2, "left");
          push("右下三分交點", (CANVAS_W / 3) * 2, (CANVAS_H / 3) * 2, "right");
          push("上方主標區", CANVAS_W / 2, 90, "center");
        } else if (type === "golden") {
          const phi = 0.618;
          push("黃金左焦點", CANVAS_W * (1 - phi), CANVAS_H * phi, "left");
          push("黃金右焦點", CANVAS_W * phi, CANVAS_H * (1 - phi), "left");
          push("黃金上焦點", CANVAS_W * phi, CANVAS_H * (1 - phi), "right");
          push("黃金下焦點", CANVAS_W * (1 - phi), CANVAS_H * phi, "center");
          push("中心偏上區", CANVAS_W / 2, CANVAS_H * 0.26, "center");
        } else if (type === "columns12") {
          const colW = CANVAS_W / 12;
          push("第2-5欄標題區", colW * 2.2, 110, "left");
          push("第7-11欄主標區", colW * 7.2, 140, "left");
          push("第2-8欄說明區", colW * 2.1, 470, "left");
          push("第9-12欄標語區", colW * 9.2, 500, "right");
          push("中欄聚焦區", CANVAS_W / 2, CANVAS_H / 2, "center");
        } else {
          push("左上平衡區", CANVAS_W * 0.24, CANVAS_H * 0.24, "left");
          push("右上平衡區", CANVAS_W * 0.76, CANVAS_H * 0.24, "right");
          push("左下平衡區", CANVAS_W * 0.24, CANVAS_H * 0.76, "left");
          push("右下平衡區", CANVAS_W * 0.76, CANVAS_H * 0.76, "right");
          push("中心對稱焦點", CANVAS_W / 2, CANVAS_H / 2, "center");
        }
        return anchors;
      }

      // 計算候選點與圖片區塊距離，偏好留白區
      function scoreAnchor(anchor, imageRect, type) {
        const margin = 18;
        const x = anchor.x;
        const y = anchor.y;
        const insideImage =
          x >= imageRect.left - margin &&
          x <= imageRect.left + imageRect.width + margin &&
          y >= imageRect.top - margin &&
          y <= imageRect.top + imageRect.height + margin;

        const cx = imageRect.left + imageRect.width / 2;
        const cy = imageRect.top + imageRect.height / 2;
        const dist = Math.hypot(x - cx, y - cy);
        const normDist = dist / Math.hypot(CANVAS_W, CANVAS_H);

        const centerPenalty = 1 - Math.hypot(x - CANVAS_W / 2, y - CANVAS_H / 2) / Math.hypot(CANVAS_W / 2, CANVAS_H / 2);
        const gridBonus = (type === "golden" || type === "thirds") ? 0.08 : 0.04;

        let score = normDist + gridBonus - centerPenalty * 0.1;
        if (insideImage) score -= 0.55; // 壓低在圖片內部的候選點
        return score;
      }

      function getMainVisualRect() {
        if (!mainVisualObject) {
          return { left: 250, top: 140, width: 380, height: 280 };
        }
        mainVisualObject.setCoords();
        const rect = mainVisualObject.getBoundingRect(true, true);
        return {
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height
        };
      }

      function buildSuggestions() {
        const type = gridTypeEl.value;
        const anchors = getGridAnchors(type);
        const imageRect = getMainVisualRect();

        // 評分並排序，產出 3~5 筆建議
        const ranked = anchors
          .map(anchor => ({
            ...anchor,
            score: scoreAnchor(anchor, imageRect, type)
          }))
          .sort((a, b) => b.score - a.score);

        const picked = ranked.slice(0, 5).map((it, idx) => {
          const baseSize = idx === 0 ? 58 : idx === 1 ? 42 : idx === 2 ? 34 : 26;
          const text = idx < 2 ? "YOUR MAIN TITLE" : idx === 2 ? "Brand Message" : "簡短說明文字";
          return {
            ...it,
            fontSize: baseSize,
            sample: text
          };
        });

        // 盡量保留 3~5 個建議
        latestSuggestions = picked.slice(0, Math.max(3, Math.min(5, picked.length)));
      }

      function renderSuggestions() {
        suggestionListEl.innerHTML = "";
        if (!latestSuggestions.length) {
          suggestionListEl.innerHTML = `<div class="empty">目前沒有可用建議，請先匯入圖片或移動畫面內容。</div>`;
          return;
        }

        latestSuggestions.forEach((sug, index) => {
          const card = document.createElement("div");
          card.className = "suggestion-card";
          card.innerHTML = `
            <div class="suggestion-title">${index + 1}. ${sug.name}</div>
            <div class="suggestion-line">建議文字：${sug.sample}</div>
            <div class="suggestion-line">建議字級：${sug.fontSize}px</div>
            <span class="chip">點擊套用到畫布</span>
          `;
          card.addEventListener("click", () => addTextBySuggestion(sug));
          suggestionListEl.appendChild(card);
        });
      }

      function addTextBySuggestion(sug) {
        const text = new fabric.Textbox(sug.sample, {
          left: sug.x,
          top: sug.y,
          originX: sug.align === "center" ? "center" : (sug.align === "right" ? "right" : "left"),
          originY: "center",
          width: 360,
          fill: "#f2fffb",
          fontSize: sug.fontSize,
          fontWeight: sug.fontSize >= 42 ? "700" : "500",
          fontFamily: "Inter, Noto Sans TC, sans-serif",
          shadow: "0 4px 14px rgba(0,0,0,0.55)",
          lineHeight: 1.15,
          selectable: true,
          editable: true
        });

        canvas.add(text);
        canvas.setActiveObject(text);
        canvas.bringToFront(text);
        canvas.requestRenderAll();
      }

      function applyTextStyle(kind) {
        const active = canvas.getActiveObject();
        if (active && (active.type === "textbox" || active.type === "text")) {
          if (kind === "title") {
            active.set({
              fontSize: 64,
              fontWeight: "700",
              fill: "#f2fffb",
              shadow: "0 6px 18px rgba(0,0,0,0.6)",
              lineHeight: 1.08
            });
          } else {
            active.set({
              fontSize: 24,
              fontWeight: "400",
              fill: "#e7fff9",
              shadow: "0 3px 10px rgba(0,0,0,0.45)",
              lineHeight: 1.3
            });
          }
          canvas.requestRenderAll();
          return;
        }

        // 若沒有選取文字，直接新增一段示範文字
        const fallback = kind === "title"
          ? { sample: "MAIN TITLE", fontSize: 64, x: CANVAS_W / 2, y: 80, align: "center" }
          : { sample: "這裡可以放簡短描述文字", fontSize: 24, x: CANVAS_W / 2, y: CANVAS_H - 70, align: "center" };
        addTextBySuggestion({ ...fallback, name: "快速風格" });
      }

      function createDemoVisual() {
        const rect = new fabric.Rect({
          left: 220,
          top: 130,
          width: 460,
          height: 320,
          rx: 10,
          ry: 10,
          fill: "rgba(255,255,255,0.14)",
          stroke: "rgba(255,255,255,0.45)",
          strokeDashArray: [8, 6],
          strokeWidth: 1.4,
          objectCaching: false
        });

        const label = new fabric.Text("Demo Image Area", {
          left: 450,
          top: 290,
          originX: "center",
          originY: "center",
          fill: "#dffdf5",
          fontSize: 28,
          fontWeight: "600",
          shadow: "0 3px 10px rgba(0,0,0,0.4)",
          selectable: false,
          evented: false
        });

        const group = new fabric.Group([rect, label], {
          left: 220,
          top: 130,
          transparentCorners: false,
          cornerColor: ACCENT,
          borderColor: ACCENT,
          hasRotatingPoint: false
        });

        group.set({ dataRole: "mainVisual" });
        canvas.add(group);
        mainVisualObject = group;
      }

      function setMainVisual(obj) {
        if (mainVisualObject && canvas.getObjects().includes(mainVisualObject)) {
          canvas.remove(mainVisualObject);
        }
        obj.set({
          left: 120,
          top: 60,
          cornerColor: ACCENT,
          borderColor: ACCENT,
          transparentCorners: false,
          dataRole: "mainVisual"
        });

        // 初始縮放至合適尺寸
        const maxW = CANVAS_W * 0.72;
        const maxH = CANVAS_H * 0.8;
        const scale = Math.min(maxW / obj.width, maxH / obj.height, 1);
        obj.scale(scale);

        canvas.add(obj);
        canvas.setActiveObject(obj);
        mainVisualObject = obj;
        clampObjectToCanvas(obj);
        canvas.requestRenderAll();
      }

      function analyzeAndRender() {
        buildSuggestions();
        renderSuggestions();
      }

      const debouncedAnalyze = debounce(analyzeAndRender, 260);

      // 監聽主要互動事件：移動/縮放時即時分析
      canvas.on("object:moving", e => {
        clampObjectToCanvas(e.target);
        if (e.target === mainVisualObject) debouncedAnalyze();
      });
      canvas.on("object:scaling", e => {
        clampObjectToCanvas(e.target);
        if (e.target === mainVisualObject) debouncedAnalyze();
      });
      canvas.on("object:modified", e => {
        clampObjectToCanvas(e.target);
        if (e.target === mainVisualObject) analyzeAndRender();
      });

      // 控制項綁定
      document.getElementById("importBtn").addEventListener("click", () => imageInput.click());

      imageInput.addEventListener("change", e => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = evt => {
          fabric.Image.fromURL(evt.target.result, img => {
            img.set({
              selectable: true,
              hasControls: true
            });
            setMainVisual(img);
            analyzeAndRender();
          }, { crossOrigin: "anonymous" });
        };
        reader.readAsDataURL(file);

        // 允許再次選同一檔案觸發 change
        imageInput.value = "";
      });

      document.getElementById("analyzeBtn").addEventListener("click", () => analyzeAndRender());

      document.getElementById("clearBtn").addEventListener("click", () => {
        canvas.clear();
        canvas.backgroundColor = "#1b2025";
        mainVisualObject = null;
        createDemoVisual();
        drawGrid(gridTypeEl.value);
        analyzeAndRender();
        canvas.requestRenderAll();
      });

      document.getElementById("applyTitleStyle").addEventListener("click", () => applyTextStyle("title"));
      document.getElementById("applyBodyStyle").addEventListener("click", () => applyTextStyle("body"));

      gridTypeEl.addEventListener("change", () => {
        drawGrid(gridTypeEl.value);
        analyzeAndRender();
      });

      // 初始化：網格 + 示範區 + 首次分析
      drawGrid(gridTypeEl.value);
      createDemoVisual();
      canvas.requestRenderAll();
      analyzeAndRender();

      // 視窗縮放時重繪網格（避免畫素模糊）
      window.addEventListener("resize", () => drawGrid(gridTypeEl.value));
    })();
  </script>
</body>
</html>
